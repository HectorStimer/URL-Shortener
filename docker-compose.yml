services:
  postgres:
    image: postgres:16
    container_name: encurtador-db
    environment:
      POSTGRES_DB: encurtador
      POSTGRES_USER: encurtador
      POSTGRES_PASSWORD: encurtador123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: